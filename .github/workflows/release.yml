# Сборка и публикация релиза лаунчера + автообновление.
#
# По пушу тега vX.Y.Z: tauri-action собирает установщик (NSIS/MSI), ПОДПИСЫВАЕТ
# его ключом обновлений, создаёт GitHub Release и заливает артефакты + latest.json.
# Лаунчер у игроков проверяет endpoint
#   https://github.com/Kingdom-RP/krp-launcher/releases/latest/download/latest.json
# и обновляется сам.
#
# ОДНОРАЗОВАЯ НАСТРОЙКА:
#   1. Сгенерировать ключ подписи (локально, ОДИН раз):
#        npm run tauri signer generate -- -w %USERPROFILE%\.tauri\krp.key
#      Публичный ключ (из вывода / файла .key.pub) вставить в
#      src-tauri/tauri.conf.json → plugins.updater.pubkey.
#   2. В репозитории Settings → Secrets and variables → Actions добавить:
#        TAURI_SIGNING_PRIVATE_KEY           = содержимое файла krp.key
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = пароль ключа (пустой, если без пароля)
#   3. Релиз: достаточно поставить тег — версию в tauri.conf.json/package.json
#      CI проставит сам из имени тега (шаг «Set version from tag»). Руками файл
#      править не нужно:
#        git tag v0.2.2 && git push origin v0.2.2
#   ВАЖНО: приватный ключ НЕЛЬЗЯ терять и НЕЛЬЗЯ коммитить — без него обновления
#   перестанут проходить проверку подписи у уже установленных лаунчеров.

name: Release launcher

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      # Кэшируем apt-пакеты Tauri (восстановление из кэша быстрее apt-download).
      - name: Install Linux deps (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev patchelf build-essential
          version: 1.0

      # Windows: исключаем target/ из Defender — real-time скан каждого файла
      # сборки Rust сильно тормозит компиляцию на раннере.
      - name: Defender exclusion (Windows speed)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}\src-tauri\target"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Кэш Rust-сборки (registry + target). Первый прогон наполняет кэш,
      # последующие релизы компилируются заметно быстрее. Ключ — по платформе.
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # Версия для сборки берётся из тега (vX.Y.Z → X.Y.Z) — ручной бамп не нужен.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      - name: Build, sign & release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kingdom RP Launcher ${{ github.ref_name }}"
          releaseBody: "Обновление лаунчера установится автоматически."
          releaseDraft: false
          prerelease: false

  # После сборки обеих платформ (ubuntu — без Windows-путей): добавить копии
  # установщиков со стабильными именами для постоянной ссылки и убрать .sig
  # (авто-обновление их не использует — подпись в latest.json).
  finalize:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      # Переименовать установщики в version-less, переписать url в latest.json на
      # них (подпись по содержимому — валидна), удалить версионные + .sig.
      # Итог: KingdomRP-Setup.exe, KingdomRP.AppImage, latest.json.
      - name: Version-less assets + patch latest.json
        run: |
          set -e
          tmp=$(mktemp -d)
          assets=$(gh release view "$TAG" -R "$REPO" --json assets -q '.assets[].name')
          exe=$(echo "$assets" | grep -E '_x64-setup\.exe$' | head -1)
          appimg=$(echo "$assets" | grep -E '_amd64\.AppImage$' | head -1)

          if [ -n "$exe" ]; then
            gh release download "$TAG" -R "$REPO" -p "$exe" -D "$tmp"
            cp "$tmp/$exe" "$tmp/KingdomRP-Setup.exe"
            gh release upload "$TAG" -R "$REPO" "$tmp/KingdomRP-Setup.exe" --clobber
          fi
          if [ -n "$appimg" ]; then
            gh release download "$TAG" -R "$REPO" -p "$appimg" -D "$tmp"
            cp "$tmp/$appimg" "$tmp/KingdomRP.AppImage"
            gh release upload "$TAG" -R "$REPO" "$tmp/KingdomRP.AppImage" --clobber
          fi

          # latest.json: url'ы → version-less имена (подпись не трогаем)
          gh release download "$TAG" -R "$REPO" -p latest.json -D "$tmp"
          sed -i -E \
            -e 's#Kingdom\.RP\.Launcher_[^/"]*_x64-setup\.exe#KingdomRP-Setup.exe#g' \
            -e 's#Kingdom\.RP\.Launcher_[^/"]*_amd64\.AppImage#KingdomRP.AppImage#g' \
            "$tmp/latest.json"
          gh release upload "$TAG" -R "$REPO" "$tmp/latest.json" --clobber

          # удалить версионные установщики + все .sig
          for a in $(echo "$assets" | grep -E '(_x64-setup\.exe|_amd64\.AppImage|\.sig)$'); do
            echo "delete $a"
            gh release delete-asset "$TAG" "$a" -R "$REPO" -y
          done
