# Сборка и публикация релиза лаунчера + автообновление.
#
# По пушу тега vX.Y.Z: tauri-action собирает установщик (NSIS/MSI), ПОДПИСЫВАЕТ
# его ключом обновлений, создаёт GitHub Release и заливает артефакты + latest.json.
# Лаунчер у игроков проверяет endpoint
#   https://github.com/Kingdom-RP/krp-launcher/releases/latest/download/latest.json
# и обновляется сам.
#
# ОДНОРАЗОВАЯ НАСТРОЙКА:
#   1. Сгенерировать ключ подписи (локально, ОДИН раз):
#        npm run tauri signer generate -- -w %USERPROFILE%\.tauri\krp.key
#      Публичный ключ (из вывода / файла .key.pub) вставить в
#      src-tauri/tauri.conf.json → plugins.updater.pubkey.
#   2. В репозитории Settings → Secrets and variables → Actions добавить:
#        TAURI_SIGNING_PRIVATE_KEY           = содержимое файла krp.key
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = пароль ключа (пустой, если без пароля)
#   3. Релиз: достаточно поставить тег — версию в tauri.conf.json/package.json
#      CI проставит сам из имени тега (шаг «Set version from tag»). Руками файл
#      править не нужно:
#        git tag v0.2.2 && git push origin v0.2.2
#   ВАЖНО: приватный ключ НЕЛЬЗЯ терять и НЕЛЬЗЯ коммитить — без него обновления
#   перестанут проходить проверку подписи у уже установленных лаунчеров.

name: Release launcher

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Кэш Rust-сборки (registry + target). Первый прогон наполняет кэш,
      # последующие релизы компилируются заметно быстрее. Ключ — по платформе.
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # Версия для сборки берётся из тега (vX.Y.Z → X.Y.Z) — ручной бамп не нужен.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      - name: Build, sign & release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kingdom RP Launcher ${{ github.ref_name }}"
          releaseBody: "Обновление лаунчера установится автоматически."
          releaseDraft: false
          prerelease: false

      # Стабильно-именованная копия установщика этой платформы — из локальных
      # артефактов сборки (без повторного скачивания). Даёт постоянную ссылку
      # .../releases/latest/download/KingdomRP-Setup.exe|KingdomRP.AppImage
      - name: Stable-named copy
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | while read -r p; do
            case "$p" in
              *setup.exe)  cp "$p" "$(dirname "$p")/KingdomRP-Setup.exe"
                           gh release upload "$TAG" "$(dirname "$p")/KingdomRP-Setup.exe" --clobber ;;
              *.AppImage)  cp "$p" "$(dirname "$p")/KingdomRP.AppImage"
                           gh release upload "$TAG" "$(dirname "$p")/KingdomRP.AppImage" --clobber ;;
            esac
          done

  # После сборки обеих платформ: убрать .sig из ассетов (авто-обновление их не
  # использует — подпись лежит в latest.json). Стабильно-именованные копии уже
  # залиты в build-джобах. Лёгкий шаг: только чистка .sig, без скачиваний.
  finalize:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      - name: Remove .sig assets
        run: |
          for a in $(gh release view "$TAG" -R "$REPO" --json assets -q '.assets[].name' | grep -E '\.sig$'); do
            echo "delete $a"
            gh release delete-asset "$TAG" "$a" -R "$REPO" -y
          done
