# modlist.example.toml — сторонние моды модпака Kingdom RP.
#
# Эти jar'ы НЕ перехостятся в dist лаунчера: они лежат в отдельном источнике
# (Releases репозитория krp-modpack / объектный бакет), а сборщик лишь скачивает
# каждый, считает/сверяет SHA-256 и пишет в manifest.json внешний url.
# Лаунчер качает их напрямую в mods/ и сверяет хеш; prune_mods их не трогает
# (они есть в манифесте).
#
# Передать сборщику:
#   cargo run --release -- --base-url <URL> --modlist ../path/to/modlist.toml
#
# ВАЖНО:
#   * file  — имя jar в папке mods игрока, без слэшей.
#   * url   — прямой URL на скачивание. Если в имени файла есть '+', '[' и т.п. —
#             экранируй в URL (%2B и т.д.). file при этом оставляй как есть.
#   * sha256 — необязателен. Указан → сборщик сверит загруженное (защита от
#             подмены/битого ассета). Опущен → сборщик вычислит сам и подставит.
#   * Лицензии: многие моды — All Rights Reserved и запрещают ре-хостинг.
#             Размещение их jar на ваших Releases — это ре-хостинг. Проверяй
#             условия каждого мода; спорные — оставляй ссылкой на исходный CDN.

[[mod]]
file   = "bettercombat-neoforge-2.1.6+1.21.1.jar"
url    = "https://github.com/Kingdom-RP/krp-modpack/releases/download/pack-v1/bettercombat-neoforge-2.1.6%2B1.21.1.jar"
sha256 = ""  # заполни хешем ассета или оставь пустым → сборщик подставит

[[mod]]
file   = "relics-1.21.1-0.10.7.5.jar"
url    = "https://github.com/Kingdom-RP/krp-modpack/releases/download/pack-v1/relics-1.21.1-0.10.7.5.jar"

# ── Зависимости тоже сюда (как обычные моды): geckolib, cloth-config, balm и т.д. ──
[[mod]]
file   = "geckolib-neoforge-1.21.1-4.7.5.1.jar"
url    = "https://github.com/Kingdom-RP/krp-modpack/releases/download/pack-v1/geckolib-neoforge-1.21.1-4.7.5.1.jar"
